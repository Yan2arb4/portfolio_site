<section class="projects" id="projects">
  <p class="project-section-title">Personal Projects</p>
  <div class="projects-grid">
    <app-project-card
      *ngFor="let project of projects"
      [project]="project"
      (cardClick)="onCardClick(project)">
    </app-project-card>
  </div>
</section>

<!-- Modal -->
<div class="modal-overlay" *ngIf="selectedProject" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeModal()">✕</button>
    <h2>{{ selectedProject.title }}</h2>
    <p>{{ selectedProject.description }}</p>
    <div class="tags">
      <span
        class="tag"
        *ngFor="let skill of selectedProject.skills"
        [style.color]="skill.color"
        [style.border-color]="skill.color"
        [style.background-color]="skill.color + '15'">
        {{ skill.name }}
      </span>
    </div>
    <a *ngIf="selectedProject.githubLink" [href]="selectedProject.githubLink" target="_blank">
      GitHub →
    </a>
  </div>
</div>
